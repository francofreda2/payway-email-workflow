databases:
  - name: payway-db
    plan: free
    databaseName: payway_emails
    user: payway

services:
  - type: web
    name: payway-email-workflow
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: DATABASE_URL
        fromDatabase:
          name: payway-db
          property: connectionURI
      - key: NOTIFICATION_EMAIL
        value: verticalmisadq@payway.com.ar
      - key: ALERT_HOURS_THRESHOLD
        value: "24"
